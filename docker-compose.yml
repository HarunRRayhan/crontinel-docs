services:
  app:
    image: ghcr.io/crontinel/app:latest
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - APP_URL=https://your-domain.com
      - APP_ENV=production
      - APP_DEBUG=false
      - DB_CONNECTION=pgsql
      - DB_HOST=db
      - DB_PORT=5432
      - DB_DATABASE=crontinel
      - DB_USERNAME=crontinel
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - MAIL_MAILER=resend
      - MAIL_FROM_ADDRESS=alerts@your-domain.com
      - CRONTINEL_ALERT_CHANNEL=email
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - app_storage:/var/www/html/storage
    networks:
      - crontinel

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_DB=crontinel
      - POSTGRES_USER=crontinel
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crontinel"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - crontinel

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - crontinel

  queue:
    image: ghcr.io/crontinel/app:latest
    restart: unless-stopped
    command: php artisan queue:work redis --queue=crontinel,default --sleep=3 --tries=3 --max-time=3600
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - crontinel

  scheduler:
    image: ghcr.io/crontinel/app:latest
    restart: unless-stopped
    command: >
      sh -c "
        while true; do
          php artisan schedule:run >> /dev/null 2>&1;
          sleep 60;
        done"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - crontinel

volumes:
  app_storage:
  postgres_data:
  redis_data:

networks:
  crontinel:
    driver: bridge
